<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bobcat Bites — Admin</title>
<style>
  :root { --blue:#1a73e8; --blue-dark:#135cc0; --blue-light:#e8f1fd; --blue-line:#d4e4f9; --red:#e5484d; --red-light:#fdecec; --muted:#64748b; }
  * { box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f6f9fd; color:#17222e; }
  header { background:#fff; color:var(--blue-dark); padding:14px 18px; border-bottom:1px solid var(--blue-line); } header h1 { font-size:18px; } header span { color:var(--red); }
  main { max-width:560px; margin:0 auto; padding:16px; }
  .card { background:#fff; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 1px 2px rgba(23,58,110,.06), 0 4px 14px rgba(23,58,110,.05); border:1px solid #eaf1fa; }
  input { width:100%; padding:12px; border:1px solid var(--blue-line); border-radius:10px; font-size:15px; margin-bottom:10px; transition:border-color .15s, box-shadow .15s; }
  input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(26,115,232,.15); }
  button.primary { width:100%; background:var(--blue); color:#fff; border:none; border-radius:12px; padding:14px; font-weight:700; font-size:15px; cursor:pointer; transition:transform .1s; box-shadow:0 3px 10px rgba(26,115,232,.25); }
  button.primary:active { transform:scale(.97); }
  button.small { padding:8px 14px; border-radius:9px; border:none; font-weight:700; font-size:13px; cursor:pointer; transition:transform .1s; }
  button.small:active { transform:scale(.94); }
  .approve { background:var(--blue-light); color:var(--blue-dark); } .suspend { background:var(--red-light); color:var(--red); } .pend { background:#eef2f7; color:var(--muted); }
  .pill { font-size:12px; font-weight:700; padding:3px 10px; border-radius:99px; }
  .pill.pending { background:#eef2f7; color:var(--muted); } .pill.approved { background:var(--blue-light); color:var(--blue-dark); } .pill.suspended { background:var(--red-light); color:var(--red); }
  .muted { color:var(--muted); font-size:13px; }
  .row { display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; }
  h3 { font-size:15px; }
  .gate { min-height:calc(100vh - 110px); display:flex; align-items:center; }
  .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(12px); background:#17222e; color:#fff; padding:12px 18px; border-radius:12px; font-size:14px; font-weight:600; box-shadow:0 8px 24px rgba(0,0,0,.2); opacity:0; transition:opacity .2s, transform .2s; z-index:100; max-width:86%; text-align:center; pointer-events:none; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.error { background:var(--red); }
</style>
</head>
<body>
<header><h1>🛡️ Bobcat <span>Bites</span> · Admin</h1></header>
<main id="view"></main>
<script>
const API = "https://gqwihtfjmxqxkzssnsrk.supabase.co/functions/v1/api";
const KEY = "sb_publishable_3H-dZcAz2r7pDnGmxMJh1w_efPN7ZVd";
let pin = sessionStorage.getItem("bb_admin_pin") || "";
let vendors = [];
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));

let toastTimer;
function toast(msg, kind) {
  let el = $("toast");
  if (!el) { el = document.createElement("div"); el.id = "toast"; document.body.appendChild(el); }
  el.textContent = msg;
  el.className = "toast show" + (kind === "error" ? " error" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
}

async function api(payload) {
  const r = await fetch(API, { method: "POST", headers: { "Content-Type": "application/json", apikey: KEY, Authorization: "Bearer " + KEY }, body: JSON.stringify(payload) });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.error || "Request failed");
  return j;
}

async function unlock() {
  pin = $("pin").value.trim();
  try { await load(); sessionStorage.setItem("bb_admin_pin", pin); }
  catch (e) { toast(e.message, "error"); pin = ""; }
}
async function load() {
  const res = await api({ action: "admin_list", pin });
  vendors = res.vendors; render();
}
async function setStatus(id, status) {
  try { await api({ action: "admin_set_status", pin, vendor_id: id, status }); load(); }
  catch (e) { toast(e.message, "error"); }
}

function render() {
  const v = $("view");
  if (!pin || !vendors.length && !vendors._loaded) { /* fallthrough below handles */ }
  if (!pin) {
    v.innerHTML = `<div class="gate"><form class="card" style="width:100%" onsubmit="event.preventDefault();unlock()"><h3 style="margin-bottom:10px">Enter admin PIN</h3>
      <input id="pin" type="password" inputmode="numeric" placeholder="PIN" autofocus>
      <button class="primary" type="submit">Unlock</button></form></div>`;
    return;
  }
  const pending = vendors.filter((x) => x.status === "pending");
  const rest = vendors.filter((x) => x.status !== "pending");
  const card = (x) => `<div class="card">
      <div class="row"><h3>${esc(x.name)}</h3><span class="pill ${x.status}">${x.status}</span></div>
      <div class="muted">${esc(x.description || "")}</div>
      <div class="muted">📍 ${esc(x.default_location || "—")} · 📱 ${esc(x.contact_phone || "—")} · ✉️ ${esc(x.contact_email || "—")}</div>
      <div class="muted">Signed up ${new Date(x.created_at).toLocaleDateString()}</div>
      <div class="row" style="margin-top:10px">
        ${x.status !== "approved" ? `<button class="small approve" onclick="setStatus('${x.id}','approved')">Approve ✓</button>` : ""}
        ${x.status !== "suspended" ? `<button class="small suspend" onclick="setStatus('${x.id}','suspended')">Suspend</button>` : ""}
        ${x.status !== "pending" ? `<button class="small pend" onclick="setStatus('${x.id}','pending')">Set pending</button>` : ""}
      </div></div>`;
  v.innerHTML = `<div class="row" style="margin-bottom:10px"><h3>Vendors (${vendors.length})</h3><button class="small pend" onclick="load()">↻ Refresh</button></div>
    ${pending.length ? `<h3 style="margin:6px 0">⏳ Awaiting approval (${pending.length})</h3>` + pending.map(card).join("") : ""}
    ${rest.map(card).join("") || '<div class="card muted">No vendors yet.</div>'}`;
}
if (pin) load().catch(() => { pin = ""; render(); });
render();
</script>
</body>
</html>
