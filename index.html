<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Bobcat Bites</title>
<link rel="manifest" href="manifest-student.webmanifest">
<meta name="theme-color" content="#002856">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bobcat Bites">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root { --navy:#002856; --gold:#DAA900; --bg:#f6f7f9; --card:#fff; --ink:#1a2233; --muted:#6b7484; --green:#1a9c5d; --red:#c73838; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); padding-bottom:84px; }
  header { background:var(--navy); color:#fff; padding:16px 20px; position:sticky; top:0; z-index:10; display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:20px; } header h1 span { color:var(--gold); }
  main { max-width:520px; margin:0 auto; padding:16px; }
  .card { background:var(--card); border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:0 1px 3px rgba(0,0,0,.07); }
  .truck { display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
  .truck:active { transform:scale(.99); }
  .pill { font-size:12px; font-weight:600; padding:3px 10px; border-radius:99px; white-space:nowrap; }
  .pill.open { background:#e2f6ec; color:var(--green); } .pill.closed { background:#fdeaea; color:var(--red); }
  .pill.placed { background:#fff3d6; color:#8a6d00; } .pill.confirmed { background:#e0ecff; color:#1d4ed8; }
  .pill.ready { background:#e2f6ec; color:var(--green); } .pill.picked_up,.pill.cancelled { background:#eee; color:var(--muted); }
  .muted { color:var(--muted); font-size:13px; }
  h2 { font-size:17px; margin-bottom:10px; } h3 { font-size:15px; }
  .item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f0f1f4; }
  .item:last-child { border-bottom:none; }
  .qty { display:flex; align-items:center; gap:10px; }
  .qty button { width:32px; height:32px; border-radius:8px; border:1px solid #d8dce3; background:#fff; font-size:18px; font-weight:700; color:var(--navy); }
  .qty button:disabled { opacity:.35; cursor:not-allowed; }
  .truck.unorderable { opacity:.6; }
  .banner.warn { background:#fdeaea; border-color:#f6c6c6; color:#8a2626; }
  button.primary { width:100%; background:var(--navy); color:#fff; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:700; cursor:pointer; }
  button.primary:disabled { opacity:.4; }
  button.link { background:none; border:none; color:var(--navy); font-weight:600; font-size:14px; cursor:pointer; padding:0 0 10px; }
  input { width:100%; padding:12px; border:1px solid #d8dce3; border-radius:10px; font-size:15px; margin-bottom:10px; }
  nav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #e6e8ec; display:flex; }
  nav button { flex:1; padding:12px 0 18px; border:none; background:none; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; }
  nav button.active { color:var(--navy); }
  nav button .ico { display:block; font-size:20px; margin-bottom:2px; }
  .countdown { font-size:40px; font-weight:800; color:var(--navy); text-align:center; margin:6px 0; font-variant-numeric:tabular-nums; }
  .code { font-size:28px; font-weight:800; letter-spacing:6px; color:var(--gold); background:var(--navy); border-radius:10px; text-align:center; padding:10px; margin-top:8px; }
  .banner { background:#fff8e1; border:1px solid #ffe9a8; color:#7a5d00; border-radius:10px; padding:10px 12px; font-size:13px; margin-bottom:12px; }
  .total { display:flex; justify-content:space-between; font-weight:700; font-size:16px; padding-top:10px; }
  .empty { text-align:center; color:var(--muted); padding:40px 0; }
</style>
</head>
<body>
<header><h1>🐾 Bobcat <span>Bites</span></h1><span class="muted" style="color:#9fb3cf">UC Merced</span></header>
<main id="view"></main>
<nav>
  <button id="nav-trucks" class="active" onclick="go('trucks')"><span class="ico">🚚</span>Trucks</button>
  <button id="nav-orders" onclick="go('orders')"><span class="ico">🧾</span>My Orders</button>
</nav>

<script>
const SUPABASE_URL = "https://gqwihtfjmxqxkzssnsrk.supabase.co";
const KEY = "sb_publishable_3H-dZcAz2r7pDnGmxMJh1w_efPN7ZVd";
const API = SUPABASE_URL + "/functions/v1/api";
const sb = supabase.createClient(SUPABASE_URL, KEY);

// Device identity (no login needed for v0)
let deviceKey = localStorage.getItem("bb_device_key");
if (!deviceKey) { deviceKey = crypto.randomUUID() + "-" + Math.random().toString(36).slice(2, 10); localStorage.setItem("bb_device_key", deviceKey); }

let state = { screen: "trucks", trucks: [], trucksLoaded: false, menu: [], truck: null, cart: {}, orders: [], pollTimer: null, tickTimer: null };
const isOrderable = (t) => !!t && t.is_open && !t.orders_paused;
const $ = (id) => document.getElementById(id);
const money = (c) => "$" + (c / 100).toFixed(2);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));

async function api(payload) {
  const r = await fetch(API, { method: "POST", headers: { "Content-Type": "application/json", apikey: KEY, Authorization: "Bearer " + KEY }, body: JSON.stringify(payload) });
  const j = await r.json().catch(() => ({ error: "Bad response" }));
  if (!r.ok) throw new Error(j.error || "Request failed");
  return j;
}

function go(screen) {
  state.screen = screen;
  document.querySelectorAll("nav button").forEach((b) => b.classList.remove("active"));
  $("nav-" + (screen === "orders" ? "orders" : "trucks")).classList.add("active");
  clearInterval(state.tickTimer);
  if (screen === "trucks") loadTrucks();
  if (screen === "orders") { requestNotifyPermission(); loadOrders(); state.tickTimer = setInterval(renderIfCounting, 1000); }
  render();
}

// Notifications: poll for order updates in the background (not just while on the
// Orders tab) so a student browsing other trucks still gets pinged when the vendor
// sets an ETA or marks their order ready.
function requestNotifyPermission() {
  if ("Notification" in window && Notification.permission === "default") Notification.requestPermission().then(render).catch(() => {});
}
async function notify(title, body) {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  const opts = { body, icon: "icon-192.png", badge: "icon-192.png", tag: "bb-order-update", renotify: true, data: { url: "./index.html" } };
  try {
    const reg = navigator.serviceWorker && (await navigator.serviceWorker.getRegistration());
    if (reg) { reg.showNotification(title, opts); return; }
  } catch (e) {}
  try { new Notification(title, opts); } catch (e) {}
}
function notifyOrderChanges(prevOrders, freshOrders) {
  freshOrders.forEach((o) => {
    const prev = prevOrders.find((p) => p.id === o.id);
    if (!prev || prev.status === o.status) return;
    const truck = o.vendors?.name || "The truck";
    if (o.status === "confirmed") notify("Order confirmed 🎉", `${truck} says it'll be ready in about ${o.eta_minutes} min.`);
    if (o.status === "ready") notify("Order ready for pickup 🔔", `Show code ${o.pickup_code || ""} at ${truck}.`);
  });
}
let orderPollTimer = null;
function startOrderPolling() {
  if (orderPollTimer) return;
  loadOrders();
  orderPollTimer = setInterval(loadOrders, 8000);
}

async function loadTrucks() {
  const { data, error } = await sb.from("vendors").select("id,name,description,is_open,orders_paused,default_location").eq("status", "approved").order("is_open", { ascending: false });
  state.trucks = error ? [] : data; state.trucksLoaded = true; render();
}

async function openTruck(id) {
  state.truck = state.trucks.find((t) => t.id === id); state.cart = {}; state.screen = "menu"; render();
  const { data } = await sb.from("menu_items").select("id,name,description,price_cents,default_prep_minutes").eq("vendor_id", id).eq("is_available", true).order("name", { ascending: true });
  state.menu = data || []; render();
}

function setQty(itemId, delta) {
  if (!isOrderable(state.truck)) return;
  state.cart[itemId] = Math.max(0, (state.cart[itemId] || 0) + delta);
  if (!state.cart[itemId]) delete state.cart[itemId];
  render();
}
const cartCount = () => Object.values(state.cart).reduce((a, b) => a + b, 0);
const cartTotal = () => Object.entries(state.cart).reduce((sum, [id, q]) => sum + (state.menu.find((m) => m.id === id)?.price_cents || 0) * q, 0);

async function placeOrder() {
  if (!isOrderable(state.truck)) { alert("This truck isn't accepting orders right now."); go("trucks"); return; }
  if (!$("s_name").value.trim()) { alert("Enter your name so the truck knows who to make it for."); $("s_name").focus(); return; }
  const btn = $("placeBtn"); btn.disabled = true; btn.textContent = "Placing…";
  try {
    const res = await api({
      action: "place_order", device_key: deviceKey,
      student_name: $("s_name").value.trim(), phone: $("s_phone").value.trim(),
      vendor_id: state.truck.id,
      items: Object.entries(state.cart).map(([menu_item_id, quantity]) => ({ menu_item_id, quantity })),
    });
    localStorage.setItem("bb_name", $("s_name").value.trim());
    requestNotifyPermission();
    alert("Order placed! Pickup code: " + res.pickup_code);
    go("orders");
  } catch (e) { alert(e.message); btn.disabled = false; btn.textContent = "Place order — demo pay"; }
}

async function loadOrders() {
  try {
    const res = await api({ action: "my_orders", device_key: deviceKey });
    const fresh = res.orders || [];
    notifyOrderChanges(state.orders, fresh);
    state.orders = fresh;
    if (state.screen === "orders") render();
  } catch (e) { /* keep last state */ }
}
function renderIfCounting() { if (state.screen === "orders" && state.orders.some((o) => o.status === "confirmed")) render(); }

function countdownFor(o) {
  if (!o.confirmed_at || !o.eta_minutes) return null;
  const readyAt = new Date(o.confirmed_at).getTime() + o.eta_minutes * 60000;
  const left = Math.max(0, readyAt - Date.now());
  const m = Math.floor(left / 60000), s = Math.floor((left % 60000) / 1000);
  return left === 0 ? "Any second…" : `${m}:${String(s).padStart(2, "0")}`;
}

function render() {
  const v = $("view");
  if (state.screen === "trucks") {
    v.innerHTML = `<div class="banner">🧪 Test mode — payment is simulated (Stripe not connected yet). Orders are real in the system.</div>
      <h2>Food trucks on campus</h2>` +
      (!state.trucksLoaded ? `<div class="empty">Loading trucks…</div>` :
      state.trucks.length ? state.trucks.map((t) => `
        <div class="card truck ${isOrderable(t) ? "" : "unorderable"}" onclick="openTruck('${t.id}')">
          <div><h3>${esc(t.name)}</h3><div class="muted">${esc(t.description || "")}</div><div class="muted">📍 ${esc(t.default_location || "Location TBA")}</div></div>
          <span class="pill ${isOrderable(t) ? "open" : "closed"}">${t.is_open ? (t.orders_paused ? "Paused" : "Open") : "Closed"}</span>
        </div>`).join("") : `<div class="empty">No trucks yet — check back soon.</div>`);
  }
  if (state.screen === "menu") {
    const t = state.truck; const orderable = isOrderable(t);
    v.innerHTML = `<button class="link" onclick="go('trucks')">← All trucks</button>
      <div class="card"><h2>${esc(t.name)}</h2><div class="muted">📍 ${esc(t.default_location || "")}</div></div>` +
      (orderable ? "" : `<div class="banner warn">🚫 ${t.orders_paused ? "This truck has paused new orders" : "This truck is currently closed"} — you can browse the menu but can't order right now.</div>`) +
      `<div class="card">` +
      (state.menu.length ? state.menu.map((m) => `
        <div class="item">
          <div style="flex:1"><b>${esc(m.name)}</b>${m.description ? `<div class="muted">${esc(m.description)}</div>` : ""}<div class="muted">${money(m.price_cents)} · ~${m.default_prep_minutes} min</div></div>
          <div class="qty"><button ${orderable ? "" : "disabled"} onclick="setQty('${m.id}',-1)">−</button><b>${state.cart[m.id] || 0}</b><button ${orderable ? "" : "disabled"} onclick="setQty('${m.id}',1)">+</button></div>
        </div>`).join("") : `<div class="empty">Loading menu…</div>`) + `</div>` +
      (orderable && cartCount() ? `<button class="primary" onclick="state.screen='checkout';render()">Checkout · ${cartCount()} item${cartCount() > 1 ? "s" : ""} · ${money(cartTotal())}</button>` : "");
  }
  if (state.screen === "checkout") {
    v.innerHTML = `<button class="link" onclick="state.screen='menu';render()">← Back to menu</button>
      <div class="card"><h2>Checkout — ${esc(state.truck.name)}</h2>` +
      Object.entries(state.cart).map(([id, q]) => { const m = state.menu.find((x) => x.id === id); return `<div class="item"><span>${q}× ${esc(m.name)}</span><span>${money(m.price_cents * q)}</span></div>`; }).join("") +
      `<div class="total"><span>Total</span><span>${money(cartTotal())}</span></div></div>
      <div class="card"><h3 style="margin-bottom:10px">Your info</h3>
        <input id="s_name" placeholder="Name (shown to the truck)" value="${esc(localStorage.getItem("bb_name") || "")}">
        <input id="s_phone" placeholder="Phone (optional)">
        <div class="banner">Demo payment — no card charged. Stripe checkout replaces this button later.</div>
        <button class="primary" id="placeBtn" onclick="placeOrder()">Place order — demo pay</button>
      </div>`;
  }
  if (state.screen === "orders") {
    const canAskNotify = "Notification" in window && Notification.permission === "default";
    v.innerHTML = `<h2>My orders</h2>` +
      (canAskNotify ? `<div class="banner">🔔 <a href="javascript:void(0)" onclick="requestNotifyPermission()" style="color:inherit;font-weight:700">Turn on notifications</a> to know the moment your order's confirmed or ready.</div>` : "") +
      (state.orders.length ? state.orders.map((o) => {
        const cd = o.status === "confirmed" ? countdownFor(o) : null;
        return `<div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center"><h3>${esc(o.vendors?.name || "Truck")}</h3><span class="pill ${o.status}">${o.status.replace("_", " ")}</span></div>
          <div class="muted">📍 ${esc(o.vendors?.default_location || "")} · ${new Date(o.created_at).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}</div>
          ${(o.order_items || []).map((i) => `<div class="item"><span>${i.quantity}× ${esc(i.item_name_snapshot)}</span><span>${money(i.unit_price_cents * i.quantity)}</span></div>`).join("")}
          <div class="total"><span>Total</span><span>${money(o.total_cents)}</span></div>
          ${o.status === "placed" ? `<div class="banner">Waiting for the truck to confirm…</div>` : ""}
          ${cd ? `<div class="muted" style="text-align:center">Ready in about</div><div class="countdown">${cd}</div>` : ""}
          ${o.status === "ready" ? `<div class="banner" style="background:#e2f6ec;border-color:#bfe8d2;color:#116b3f">🎉 Ready! Show this code at the window:</div>` : ""}
          ${o.status !== "cancelled" && o.status !== "picked_up" ? `<div class="code">${esc(o.pickup_code || "")}</div>` : ""}
        </div>`;
      }).join("") : `<div class="empty">No orders yet.<br>Hit the Trucks tab and grab something 🌯</div>`);
  }
}
go("trucks");
startOrderPolling();

// PWA: register service worker (only works over https — i.e. once hosted on Netlify)
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
</html>
